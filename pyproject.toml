[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers"
asyncio_mode = "auto"
markers = [
    "integration: tests that require running infrastructure",
]

[tool.coverage.run]
branch = true
source = ["backend", "frontend"]
omit = [
    "backend/.venv/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 2

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "backend/.venv",
    "storage",
    "frontend_old_backup",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "B",
    "UP",
]
ignore = [
    "B008",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"